name: CI
# Controls when the action will run.
on:
  # Triggers the workflow on push or pull request events but only for the main branch
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
concurrency:
  # Cancel previous actions from the same PR or branch except 'main' branch.
  # See https://docs.github.com/en/actions/using-jobs/using-concurrency and https://docs.github.com/en/actions/learn-github-actions/contexts for more info.
  group: concurrency-group::${{ github.workflow }}::${{ github.event.pull_request.number > 0 && format('pr-{0}', github.event.pull_request.number) || github.ref_name }}${{ github.ref_name == 'main' && format('::{0}', github.run_id) || ''}}
  cancel-in-progress: ${{ github.ref_name != 'main' }}
jobs:
  test:
    strategy:
      matrix:
        # Note: linux is tested on Buildkite via Aspect Workflows
        os:
          - macos-latest
          # TODO: Windows was disabled in the original bazel-lib location where tar was tested:
          # https://github.com/bazel-contrib/bazel-lib/blob/8a9204ab17cbe337a64e838dd193b00f243764fb/.github/workflows/ci.yaml#L92
          # - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.15.0
      - run: bazel test //...
  # Theory 2: symlinks inside a venv TreeArtifact that point into a separate
  # whl_install TreeArtifact must keep whl_install in the tar cache key.
  #
  # venv_binary declares whl_install as an action input (no dangling symlinks on
  # any platform), but the mtree only covers venv_binary's own runfiles.  Because
  # no mtree content= path names a file inside whl_install directly, the pruner
  # must still retain whl_install — bsdtar needs to dereference the venv symlinks
  # into it.  The test fails if whl_install appears in the _unused_inputs_file
  # output group, which means it would be dropped from the tar cache key and a
  # whl content change could produce a stale cached archive.
  cross_treeartifact_symlink_pruning_test:
    strategy:
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: bazel-contrib/setup-bazel@0.15.0
      - name: Build tar_theory2 and inspect unused_inputs
        run: |
          bazel build //tar/tests:tar_theory2 --output_groups=_unused_inputs_file
          unused=$(cat bazel-bin/tar/tests/tar_theory2.unused_inputs.txt 2>/dev/null || true)
          if echo "$unused" | grep -q "theory2_whl_install"; then
            echo "FAIL: theory2_whl_install incorrectly marked as unused"
            echo "      whl_install is referenced via venv symlinks and must stay in the cache key"
            echo "Unused inputs:"
            echo "$unused"
            exit 1
          fi
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pre-commit/action@v3.0.1
  # For branch protection settings, this job provides a "stable" name that can be used to gate PR merges
  # on "all matrix jobs were successful".
  conclusion:
    needs: [test, cross_treeartifact_symlink_pruning_test, pre-commit]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: technote-space/workflow-conclusion-action@45ce8e0eb155657ab8ccf346ade734257fd196a5 # v3.0.3
      # Note: possible conclusion values:
      # https://github.com/technote-space/workflow-conclusion-action/blob/main/src/constant.ts
      - name: report success
        if: ${{ env.WORKFLOW_CONCLUSION == 'success' }}
        working-directory: /tmp
        run: echo ${{ env.WORKFLOW_CONCLUSION }} && exit 0
      - name: report failure
        if: ${{ env.WORKFLOW_CONCLUSION == 'failure' }}
        working-directory: /tmp
        run: echo ${{ env.WORKFLOW_CONCLUSION }} && exit 1
